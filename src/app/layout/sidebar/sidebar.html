<aside class="sidebar">
  <header class="sidebar__brand">
    <lucide-icon name="store" [size]="22" />
    <div>
      <strong>{{ auth.negocio()?.nombre || 'Tienda' }}</strong>
      <span>{{ auth.rolPrincipal() }}</span>
    </div>
  </header>

  <nav class="sidebar__nav">
    @for (it of itemsPermitidos(); track it.route) {
      <a [routerLink]="it.route"
         routerLinkActive="active"
         [routerLinkActiveOptions]="{ exact: false }">
        <lucide-icon [name]="it.icon" [size]="18" />
        <span>{{ it.label }}</span>
      </a>
    }
  </nav>

  <footer class="sidebar__footer">
    <div class="user">
      <strong>{{ auth.usuario()?.nombre_completo }}</strong>
      <span>{{ auth.usuario()?.email }}</span>
    </div>
    <button type="button" class="logout" (click)="toggleTheme()"
            [title]="theme.resolved() === 'dark' ? 'Cambiar a tema claro' : 'Cambiar a tema oscuro'">
      <lucide-icon [name]="theme.resolved() === 'dark' ? 'sun' : 'moon'" [size]="18" />
    </button>
    <button type="button" class="logout" (click)="logout()" title="Cerrar sesión">
      <lucide-icon name="log-out" [size]="18" />
    </button>
  </footer>
</aside>
